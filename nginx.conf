server {
    listen 80;

    # 1. Route /api and /fixr-uploads to your Express backend
    location /api/ {
        proxy_pass http://fixrserver:8080; # 'fixrserver' is the service name in docker-compose
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    location /fixr-uploads/ {
        proxy_pass http://fixrserver:8080;
        proxy_set_header Host $host;
    }

    # 2. Route everything else (normal purpose) to your frontend or other service
    location / {
        proxy_pass http://fixr-frontend:8085; # Change this to your other service name
        proxy_set_header Host $host;
    }
}