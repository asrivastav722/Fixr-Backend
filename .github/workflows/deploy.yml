name: Runner Connectivity Test

on:
  push:
    branches: [ main ]
  workflow_dispatch: # Allows you to run it manually from the Actions tab

jobs:
  test-runner:
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: System Info Check
        shell: powershell
        run: |
          Write-Host "✅ Connection Successful!"
          Write-Host "Runner Name: $env:COMPUTERNAME"
          Write-Host "Current Directory: $(Get-Location)"
          Write-Host "Checking for Docker..."
          docker --version
          # cc